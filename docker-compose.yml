version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ketem_db
    restart: always
    environment:
      POSTGRES_DB: ketem_edu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ketem_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ketem_backend
    restart: always
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ketem_edu
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 7d
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      FRONTEND_URL: ${SITE_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      - postgres
    networks:
      - ketem_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${SITE_URL}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    container_name: ketem_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ketem_network

volumes:
  postgres_data:

networks:
  ketem_network:
    driver: bridge
